name: 更新A股模糊搜索目录

on:
  schedule:
    - cron: '15 20 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests pypinyin
      - run: python scripts/update_catalog.py
      - name: 有变化时提交
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data/stock-catalog.json
          git diff --cached --quiet || git commit -m "data: refresh A-share search catalog"
          git push
